services:

  postgres: 
    image: postgres:17
    container_name: history_weather
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data                    # local only, gitignored + TO BE REMOVED BEFORE COMMIT + SAME BELOW
      - ./sql:/docker-entrypoint-initdb.d  # local only, gitignored - Postgres automatically runs any .sql file placed in that folder on startup
    ports:
      -   "5433:5432"  # changed on 18 03 to chekc if query.py works/if not, change pas to 5432:5432
    healthcheck:                                  # ← NEW: waits until Postgres accepts connections
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5


  etl:
    build: ./app                        # folder containing your script + Dockerfile
    container_name: etl_runner
    command: python weather_pipeline.py
    env_file: .env
    volumes:
      - ./data:/app/data                # mounts mockup_data.csv + output folder
    depends_on:
      postgres:
        condition: service_healthy      # ← waits for Postgres to be truly ready


  fastapi:  #app
    build: ./app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres_data:
